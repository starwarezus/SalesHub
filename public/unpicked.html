<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unpicked Items — Gold Label NY</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e25;--bg4:#21262f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8eaed;--text2:#8b9099;--text3:#555c66;--accent:#4f8ef7;--green:#3ecf8e;--amber:#f6ad55;--red:#f56565;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--text2)}
.logo span{color:var(--accent)}
.divider{width:1px;height:16px;background:var(--border2)}
.page-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:0.08em}
.topbar-right{display:flex;align-items:center;gap:12px}
.refresh-status{font-family:var(--mono);font-size:10px;color:var(--text3)}
.refresh-ok{color:var(--green)}
.countdown{font-family:var(--mono);font-size:10px;color:var(--text3)}
.summary-bar{padding:16px 24px;display:flex;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:120px}
.metric-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.metric-val{font-family:var(--mono);font-size:20px;font-weight:500;line-height:1;color:var(--text)}
.filter-bar{padding:10px 24px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.filter-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
input[type=text]{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 10px;outline:none}
input[type=text]:focus{border-color:var(--accent)}
select{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 10px;outline:none}
select option{background:var(--bg3)}
.btn{font-family:var(--mono);font-size:11px;padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.15s}
.btn:hover{color:var(--text);border-color:var(--border2)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.content{padding:16px 24px 40px}
.tbl-wrap{border:1px solid var(--border);border-radius:8px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg2)}
th{padding:9px 14px;text-align:left;font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.order-link{color:var(--accent);font-family:var(--mono);font-size:11px;text-decoration:none;border-bottom:1px dashed rgba(79,142,247,0.35)}
.order-link:hover{color:#7ab3ff}
.item-cell{display:flex;align-items:center;gap:8px}
.thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;cursor:pointer;border:1px solid var(--border);background:var(--bg3);flex-shrink:0;transition:border-color 0.15s}
.thumb:hover{border-color:var(--accent)}
.thumb-ph{width:32px;height:32px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;flex-shrink:0;font-family:var(--mono)}
.remaining-val{color:var(--amber);font-family:var(--mono);font-weight:500}
.empty{padding:60px 24px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text3)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#lightbox.open{display:flex}
#lightbox img{max-width:80vw;max-height:72vh;border-radius:8px;object-fit:contain;border:1px solid var(--border2)}
#lb-name{font-family:var(--mono);font-size:12px;color:var(--text2);max-width:80vw;text-align:center}
#lb-close{position:absolute;top:20px;right:24px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lb-close:hover{background:var(--red);border-color:var(--red);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Gold Label <span>NY</span></div>
    <div class="divider"></div>
    <div class="page-title">Unpicked Items — Live</div>
  </div>
  <div class="topbar-right">
    <span class="refresh-status" id="refresh-status"><span class="spinner"></span>Loading...</span>
    <span class="countdown" id="countdown"></span>
  </div>
</div>

<div class="summary-bar" id="summary-bar">
  <div style="font-family:var(--mono);font-size:12px;color:var(--text3)"><span class="spinner"></span>Fetching unpicked items...</div>
</div>

<div class="filter-bar" id="filter-bar" style="display:none">
  <span class="filter-label">Filter</span>
  <input type="text" id="search" placeholder="search..." style="width:200px"/>
  <select id="wh-filter"><option value="">all warehouses</option></select>
  <select id="co-filter"><option value="">all companies</option></select>
  <button class="btn" id="inum-btn">i# only</button>
</div>

<div class="content" id="content">
  <div style="padding:60px 24px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text3)" id="loading-msg"><span class="spinner"></span>Loading...</div>
</div>

<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt=""/>
  <div id="lb-name"></div>
</div>

<script>
const SC_BASE = 'https://blny.sellercloud.com';
const REFRESH_MS = 15 * 60 * 1000;
let allItems = [], imageMap = {}, nextRefresh = null, countdownTimer = null;
let inumOnly = true;

function isINum(sku){ return /^i\d+$/i.test((sku||'').trim()); }

async function load(){
  document.getElementById('refresh-status').innerHTML = '<span class="spinner"></span>Fetching...';
  try{
    const r = await fetch('/api/unpicked/today');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    allItems = data.items || [];

    // Fetch images
    const skus = [...new Set(allItems.map(it=>it.productID).filter(Boolean))];
    if(skus.length){
      for(let i=0;i<skus.length;i+=50){
        const chunk=skus.slice(i,i+50);
        const ir=await fetch('/api/images?skus='+encodeURIComponent(chunk.join(',')));
        if(ir.ok) Object.assign(imageMap, await ir.json());
      }
    }

    const updated = new Date(data.generatedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
    document.getElementById('refresh-status').innerHTML = '<span class="refresh-ok">Updated '+updated+' ET</span>';
    document.title = 'Unpicked ('+data.count+') — Gold Label NY';

    renderSummary(data);
    buildFilters();
    render();

    nextRefresh = Date.now()+REFRESH_MS;
    if(countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(updateCountdown,1000);
    setTimeout(load,REFRESH_MS);
  }catch(e){
    document.getElementById('refresh-status').textContent = 'Error: '+e.message;
    setTimeout(load,60000);
  }
}

function updateCountdown(){
  if(!nextRefresh) return;
  const rem = Math.max(0,nextRefresh-Date.now());
  const m = Math.floor(rem/60000);
  const s = Math.floor((rem%60000)/1000);
  document.getElementById('countdown').textContent = 'Refreshes in '+m+':'+String(s).padStart(2,'0');
}

function renderSummary(data){
  const dr = data.dateRange ? data.dateRange.from.replace(/\//g,'-')+' → '+data.dateRange.to.replace(/\//g,'-') : 'Last 7 days';
  document.getElementById('summary-bar').innerHTML =
    '<div class="metric"><div class="metric-label">Date range</div><div class="metric-val" style="font-size:13px;color:var(--text2)">'+dr+'</div></div>'+
    '<div class="metric"><div class="metric-label">Unpicked Items</div><div class="metric-val" style="color:var(--accent)">'+data.count+'</div></div>'+
    '<div class="metric"><div class="metric-label">Orders Affected</div><div class="metric-val" style="color:var(--amber)">'+data.orderCount+'</div></div>';
}

function buildFilters(){
  const warehouses=[...new Set(allItems.map(it=>it.warehouse))].sort();
  const wf=document.getElementById('wh-filter'); const wv=wf.value;
  wf.innerHTML='<option value="">all warehouses</option>';
  warehouses.forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;wf.appendChild(o);});
  if(warehouses.includes(wv)) wf.value=wv;

  const companies=[...new Set(allItems.map(it=>it.companyName))].sort();
  const cf=document.getElementById('co-filter'); const cv=cf.value;
  cf.innerHTML='<option value="">all companies</option>';
  companies.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cf.appendChild(o);});
  if(companies.includes(cv)) cf.value=cv;

  document.getElementById('filter-bar').style.display='flex';
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const wh=document.getElementById('wh-filter').value;
  const co=document.getElementById('co-filter').value;
  return allItems.filter(it=>{
    if(inumOnly && !isINum(it.productID)) return false;
    if(wh && it.warehouse!==wh) return false;
    if(co && it.companyName!==co) return false;
    if(q){
      const hay=[it.companyName,it.orderSourceOrderID,it.productName,it.productID,it.warehouse].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function render(){
  const items=getFiltered();
  const content=document.getElementById('content');
  const loadingMsg=document.getElementById('loading-msg');
  if(loadingMsg) loadingMsg.style.display='none';

  if(!items.length){
    content.innerHTML='<div class="empty">No unpicked in-process items</div>';
    return;
  }

  // Single flat table — no grouping
  const wrap=document.createElement('div');
  wrap.className='tbl-wrap';

  const table=document.createElement('table');

  // Header
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  ['Company','Order ID','Order Date','Item','Warehouse','Qty','Picked','Remaining'].forEach((h,i)=>{
    const th=document.createElement('th');
    th.textContent=h;
    if(i>=5) th.style.textAlign='center';
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  table.appendChild(thead);

  // Body
  const tbody=document.createElement('tbody');
  items.forEach(it=>{
    const tr=document.createElement('tr');
    const scUrl=SC_BASE+'/Orders/Detail.aspx?id='+it.orderID;
    const dt=it.orderDate?new Date(it.orderDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    const imgUrl=imageMap[it.productID]||'';
    const proxyUrl=imgUrl?'/api/image?url='+encodeURIComponent(imgUrl):'';

    // Company
    const tdCo=document.createElement('td');
    tdCo.style.cssText='font-family:var(--mono);font-size:11px;color:var(--text2)';
    tdCo.textContent=it.companyName;
    tr.appendChild(tdCo);

    // Order ID
    const tdOrd=document.createElement('td');
    const a=document.createElement('a');
    a.className='order-link'; a.href=scUrl; a.target='_blank'; a.textContent=it.orderSourceOrderID;
    tdOrd.appendChild(a); tr.appendChild(tdOrd);

    // Date
    const tdDt=document.createElement('td');
    tdDt.style.cssText='font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap';
    tdDt.textContent=dt; tr.appendChild(tdDt);

    // Item (image + name)
    const tdItem=document.createElement('td');
    const cell=document.createElement('div'); cell.className='item-cell';
    if(proxyUrl){
      const img=document.createElement('img');
      img.className='thumb'; img.src=proxyUrl; img.alt=it.productName;
      img.loading='lazy'; img.dataset.name=it.productName; img.dataset.url=proxyUrl;
      const ph=document.createElement('span'); ph.className='thumb-ph'; ph.textContent='?'; ph.style.display='none';
      img.onerror=function(){this.style.display='none';ph.style.display='inline-flex';};
      img.addEventListener('click',()=>{
        document.getElementById('lb-img').src=proxyUrl;
        document.getElementById('lb-name').textContent=it.productName;
        document.getElementById('lightbox').classList.add('open');
      });
      cell.appendChild(img); cell.appendChild(ph);
    } else {
      const ph=document.createElement('span'); ph.className='thumb-ph'; ph.textContent='?';
      cell.appendChild(ph);
    }
    const nameSpan=document.createElement('span'); nameSpan.style.fontSize='11px'; nameSpan.textContent=it.productName;
    cell.appendChild(nameSpan); tdItem.appendChild(cell); tr.appendChild(tdItem);

    // Warehouse
    const tdWh=document.createElement('td');
    tdWh.style.cssText='font-family:var(--mono);font-size:11px;color:var(--text2)';
    tdWh.textContent=it.warehouse; tr.appendChild(tdWh);

    // Qty, Picked
    [it.qty, it.qtyPicked].forEach(v=>{
      const td=document.createElement('td');
      td.style.cssText='font-family:var(--mono);text-align:center'; td.textContent=v; tr.appendChild(td);
    });

    // Remaining
    const tdRem=document.createElement('td'); tdRem.style.textAlign='center';
    const remSpan=document.createElement('span'); remSpan.className='remaining-val'; remSpan.textContent=it.remaining;
    tdRem.appendChild(remSpan); tr.appendChild(tdRem);

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  content.innerHTML='';
  content.appendChild(wrap);
}

// Lightbox
document.getElementById('lightbox').addEventListener('click',e=>{
  if(e.target===document.getElementById('lightbox')||e.target===document.getElementById('lb-close'))
    document.getElementById('lightbox').classList.remove('open');
});
document.addEventListener('keydown',e=>{if(e.key==='Escape') document.getElementById('lightbox').classList.remove('open');});

// Filters
document.getElementById('search').addEventListener('input',render);
document.getElementById('wh-filter').addEventListener('change',render);
document.getElementById('co-filter').addEventListener('change',render);
// Set initial state of i# button
document.getElementById('inum-btn').classList.add('on');

document.getElementById('inum-btn').addEventListener('click',()=>{
  inumOnly=!inumOnly;
  document.getElementById('inum-btn').classList.toggle('on',inumOnly);
  render();
});

load();
</script>
</body>
</html>
